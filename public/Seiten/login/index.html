<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEZAcademy — Neural Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/global.css">
    <style>
        .auth-container {
            width: 100%;
            max-width: 450px;
            margin-top: 5vh;
            animation: fadeInUp 0.8s ease-out;
        }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h1 { font-family: "Orbitron", sans-serif; font-size: 2rem; color: var(--neon-cyan); margin-bottom: 10px; }
        .auth-header p { color: var(--text-dim); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
        .form-input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            transition: border-color var(--trans), box-shadow var(--trans);
        }
        .form-input:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 245, 255, 0.2); }
        .auth-footer { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-dim); }
        .auth-footer a { color: var(--neon-violet); text-decoration: none; font-weight: 600; }
        .social-auth { display: flex; gap: 15px; margin-top: 30px; }
        .social-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.03); color: #fff; cursor: pointer; transition: all var(--trans); font-size: 0.8rem; }
        .social-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--neon-violet); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorTrail"></div>
    <div class="nav-tooltip" id="tooltip"></div>
    <canvas id="bg-stars"></canvas>
    
    <div class="scene">
        <div class="nav-wrapper">
            <div class="brand"><a href="../../../index.html" class="brand-link">FEZAcademy</a></div>
            <nav class="nav-capsule">
                <div class="nav-items">
                    <a href="../../../index.html" class="nav-item" data-label="Hub Central" data-t="nav_home">
                        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/></svg></div>
                        <span class="nav-label" data-t="nav_home">Home</span>
                    </a>
                    <a href="../gaming/index.html" class="nav-item" data-label="Gaming Nexus" data-t="gaming_title">
                        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M6 12h4m12 0a8 8 0 11-16 0 8 8 0 0116 0zM15 15l2 2m-2-2l2-2"/></svg></div>
                        <span class="nav-label">Gaming</span>
                    </a>
                    <a href="../coding/index.html" class="nav-item" data-label="Dev Sanctuary" data-t="coding_title">
                        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 3L2 8l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
                        <span class="nav-label">Coding</span>
                    </a>
                    <a href="../updates/index.html" class="nav-item" data-label="Sector Log" data-t="nav_updates">
                        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
                        <span class="nav-label" data-t="nav_updates">Updates</span>
                    </a>
                    <div class="nav-divider"></div>
                    <div class="nav-item" id="settingsTrigger" data-label="Settings" data-t="nav_settings">
                        <div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg></div>
                        <span class="nav-label" data-t="nav_settings">Settings</span>
                    </div>
                </div>
            </nav>
        </div>

        <div class="auth-container glass-card">
            <div class="auth-header">
                <h1 data-t="login_title">Neural Login</h1>
                <p data-t="login_subtitle">Betreten Sie den Nexus</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Neural ID</label>
                    <input type="email" class="form-input" placeholder="name@cosmos.com" required>
                </div>
                <div class="form-group">
                    <label>Access Key</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="glow-button" style="width: 100%; margin-top: 10px;">Authorize ▶</button>
            </form>
            
            <div class="social-auth">
                <button class="social-btn">Discord</button>
                <button class="social-btn">GitHub</button>
            </div>

            <div class="auth-footer">
                Noch kein Account? <a href="../register/index.html" data-t="nav_register">Registrieren</a>
            </div>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h2 data-t="settings_title">Control Center</h2>
            <button class="close-settings" id="closeSettings">×</button>
        </div>
        <div class="settings-body">
            <div class="setting-group">
                <label data-t="settings_theme">Visual Mode</label>
                <input type="checkbox" id="themeToggle">
            </div>
            <div class="setting-group">
                <label data-t="settings_lang">Core Language</label>
                <div class="lang-switch" style="display:flex;gap:10px;">
                    <button class="lang-btn" data-lang="de">
                        <div class="lang-icon">
                            <svg viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10" fill="#000"/>
                                <path d="M2.5 12h19A10 10 0 0112 22 10 10 0 012.5 12z" fill="#FFCE00"/>
                                <path d="M2 12h20a10 10 0 00-10-10A10 10 0 002 12z" fill="#D00"/>
                                <rect y="8" width="24" height="8" fill="#D00"/>
                            </svg>
                        </div>
                        DE
                    </button>
                    <button class="lang-btn" data-lang="en">
                        <div class="lang-icon">
                            <svg viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10" fill="#00247D"/>
                                <path d="M12 2v20M2 12h20" stroke="#fff" stroke-width="3"/>
                                <path d="M2.5 2.5l19 19M21.5 2.5l-19 19" stroke="#fff" stroke-width="2"/>
                                <path d="M12 2v20M2 12h20" stroke="#CF142B" stroke-width="1.5"/>
                            </svg>
                        </div>
                        EN
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/core.js"></script>
</body>
</html>
